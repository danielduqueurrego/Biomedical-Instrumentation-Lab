name: Python tests

on:
  pull_request:
  push:
    branches:
      - main
      - 'main/*'

jobs:
  unit-tests:
    name: Fast Python unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
